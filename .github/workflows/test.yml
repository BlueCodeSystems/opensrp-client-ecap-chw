name: CI
on:
  push:
    branches: [ test ]
  workflow_dispatch:

jobs:
  package:
    name: Generate APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v2

      - name: set up JDK 1.8
        uses: actions/setup-java@v1
        with:
          java-version: 1.8

      - name:  Add github user
        env:
          GIT_USR: ${{ secrets.GIT_USR }}
        run: echo gpr.usr=\ "$GIT_USR \" > ./local.properties

      - name: Add github access token
        env:
          GIT_TKN: ${{ secrets.GIT_TKN }}
        run: echo "gpr.key=\ "$GIT_TKN \" > local.properties

      - name:  Add oauth id
        run: echo "oauth.client.id=${{secrets.OAUTH_CLIENT_ID}}\n">> local.properties

      - name: Add oauth secret
        run: echo "oauth.client.secret=${{secrets.OAUTH_CLIENT_SECRET}}">> local.properties
      - name: Build final apk
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: ecap-II-debug.apk
          path: app/build/outputs/apk/debug/opensrp-ecap-chw-ecap-debug.apk
